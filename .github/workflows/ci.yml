name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: bore-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test, vet, build
        run: |
          go test ./internal/client/... ./cmd/bore
          go vet ./internal/client/... ./cmd/bore
          go build ./cmd/bore

  relay:
    name: Relay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test, vet, build
        run: |
          go test ./internal/relay/... ./cmd/relay
          go vet ./internal/relay/... ./cmd/relay
          go build ./cmd/relay

  punchthrough:
    name: Punchthrough
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test, vet, build
        run: |
          go test ./internal/punchthrough/... ./cmd/punchthrough
          go vet ./internal/punchthrough/... ./cmd/punchthrough
          go build ./cmd/punchthrough

  bore-admin:
    name: bore-admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet and build
        run: |
          go vet ./cmd/bore-admin
          go build ./cmd/bore-admin

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install
        run: bun install --frozen-lockfile
      - name: Check
        run: bun run check
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
