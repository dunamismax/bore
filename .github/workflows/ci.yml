name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: bore-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - uses: golangci/golangci-lint-action@v7
      - name: Vulnerability scan
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test and build
        run: |
          go test ./internal/client/... ./cmd/bore
          go build ./cmd/bore

  relay:
    name: Relay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test and build
        run: |
          go test ./internal/relay/... ./cmd/relay
          go build ./cmd/relay

  punchthrough:
    name: Punchthrough
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test and build
        run: |
          go test ./internal/punchthrough/... ./cmd/punchthrough
          go build ./cmd/punchthrough

  bore-admin:
    name: bore-admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./cmd/bore-admin

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install
        run: bun install --frozen-lockfile
      - name: Check
        run: bun run check
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
