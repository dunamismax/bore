<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}bore{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.17/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-hover: #334155;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #c2712e;
      --secondary: #2a9d8f;
      --bar-primary: linear-gradient(90deg, rgba(194,113,46,0.7), #c2712e);
      --bar-secondary: linear-gradient(90deg, rgba(42,157,143,0.7), #2a9d8f);
      --bar-neutral: linear-gradient(90deg, rgba(148,163,184,0.4), rgba(148,163,184,0.7));
    }
    body { background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, sans-serif; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; }
    .label { font-family: ui-monospace, monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary); }
    .metric-value { font-size: 1.875rem; font-weight: 700; line-height: 1; letter-spacing: -0.025em; }
    .text-muted { color: var(--text-muted); }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: background 0.15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #a85e24; }
    .btn-outline { border: 1px solid var(--border); color: var(--text-muted); }
    .btn-outline:hover { background: var(--card); color: var(--text); }
    .bar-track { height: 0.625rem; background: #1e293b; border-radius: 9999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 9999px; transition: width 0.3s; }
    .step-num { display: grid; place-items: center; width: 2.5rem; height: 2.5rem; border-radius: 9999px; background: rgba(42,157,143,0.1); color: var(--secondary); font-family: ui-monospace, monospace; }
    a { color: inherit; text-decoration: none; }
    nav a:hover, nav a.active { color: var(--text); }
    code { font-family: ui-monospace, monospace; font-size: 0.875em; }
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div style="max-width: 72.5rem; margin: 0 auto; padding: 1rem 1rem 3rem;">
    <header style="display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; padding: 1rem 0;">
      <a href="/" style="display: flex; align-items: center; gap: 0.75rem;">
        <span style="border: 1px solid var(--border); background: var(--card); padding: 0.25rem 0.75rem; border-radius: 9999px; font-family: ui-monospace, monospace; font-size: 0.875rem; letter-spacing: 0.1em;">bore</span>
        <span class="text-muted" style="font-size: 0.875rem;">payload-blind encrypted transfer</span>
      </a>
      <nav style="display: flex; gap: 0.25rem;">
        <a href="/" class="text-muted" style="padding: 0.5rem 0.75rem; border-radius: 9999px; font-size: 0.875rem;">Product</a>
        <a href="/ops/relay" class="text-muted" style="padding: 0.5rem 0.75rem; border-radius: 9999px; font-size: 0.875rem;">Relay Ops</a>
      </nav>
    </header>

    <main style="display: grid; gap: 2rem;">
      {% block content %}{% endblock %}
    </main>

    <footer style="margin-top: 3.5rem; border-top: 1px solid var(--border); padding-top: 2rem; font-size: 0.875rem;" class="text-muted">
      <p>Bore transfers files directly between peers with end-to-end encryption. The relay is a signaling server and fallback transport — always payload-blind.</p>
    </footer>
  </div>
</body>
</html>
